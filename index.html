<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LGS Puan Hesaplama</title>

<style>
body{
margin:0;
font-family:Arial;
background:#eef2ff;
}

.container{
max-width:700px;
margin:40px auto;
background:white;
border-radius:15px;
overflow:hidden;
box-shadow:0 10px 25px rgba(0,0,0,.1);
}

/* TAB BAR */
.tabs{
display:flex;
background:#2563eb;
}

.tab{
flex:1;
padding:15px;
text-align:center;
color:white;
cursor:pointer;
font-weight:bold;
}

.tab.active{
background:#1d4ed8;
}

/* CONTENT */
.content{
padding:20px;
display:none;
}

.content.active{
display:block;
}

/* INPUT */
input{
width:100%;
padding:10px;
margin-top:8px;
border-radius:10px;
border:1px solid #ccc;
}

button{
width:100%;
padding:10px;
margin-top:15px;
border:none;
background:#2563eb;
color:white;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

.result{
margin-top:15px;
font-size:18px;
font-weight:bold;
color:#16a34a;
text-align:center;
}

.small{
font-size:13px;
color:#64748b;
text-align:center;
margin-top:10px;
}
</style>
</head>

<body>

<div class="container">

<!-- TAB BUTTONS -->
<div class="tabs">
<div class="tab active" onclick="openTab(0)">LGS Hesaplama</div>
<div class="tab" onclick="openTab(1)">Hakkımızda</div>
</div>

<!-- LGS -->
<div class="content active">

<h2>LGS Net & Puan Hesaplama</h2>

<input id="d1" type="number" placeholder="Türkçe Doğru">
<input id="y1" type="number" placeholder="Türkçe Yanlış">

<input id="d2" type="number" placeholder="Matematik Doğru">
<input id="y2" type="number" placeholder="Matematik Yanlış">

<input id="d3" type="number" placeholder="Fen Doğru">
<input id="y3" type="number" placeholder="Fen Yanlış">

<input id="d4" type="number" placeholder="İnkılap Doğru">
<input id="y4" type="number" placeholder="İnkılap Yanlış">

<input id="d5" type="number" placeholder="Din Doğru">
<input id="y5" type="number" placeholder="Din Yanlış">

<input id="d6" type="number" placeholder="İngilizce Doğru">
<input id="y6" type="number" placeholder="İngilizce Yanlış">

<button onclick="calc()">Hesapla</button>

<div class="result" id="res"></div>
<div class="small" id="det"></div>

</div>

<!-- ABOUT -->
<div class="content">

<h2>Hakkımızda</h2>

<p style="line-height:1.6;">
Bu LGS hesaplama aracı öğrencilerin net ve puan hesaplamasını kolaylaştırmak için hazırlanmıştır.
</p>

<p class="small">
Geliştirici: Yuşa Çiloğlan
</p>

</div>

</div>

<script>

/* TAB SYSTEM */
function openTab(i){

let tabs = document.querySelectorAll(".tab")
let contents = document.querySelectorAll(".content")

tabs.forEach(t=>t.classList.remove("active"))
contents.forEach(c=>c.classList.remove("active"))

tabs[i].classList.add("active")
contents[i].classList.add("active")

}

/* NET HESAP */
function net(d,y){
return (Number(d)||0) - (Number(y)||0)/4
}

function calc(){

let totalNet =
net(d1.value,y1.value)+
net(d2.value,y2.value)+
net(d3.value,y3.value)+
net(d4.value,y4.value)+
net(d5.value,y5.value)+
net(d6.value,y6.value)

/* LGS puan benzeri ölçek */
let puan = 100 + totalNet * 8.5

res.innerHTML =
"LGS Puan: " + puan.toFixed(2)

det.innerHTML =
"Toplam Net: " + totalNet.toFixed(2)

localStorage.setItem("lgs_last", puan)

}

/* LAST SCORE */
window.onload=()=>{
let last = localStorage.getItem("lgs_last")
if(last){
res.innerHTML = "Son LGS: " + Number(last).toFixed(2)
}
}

</script>

</body>
</html>
