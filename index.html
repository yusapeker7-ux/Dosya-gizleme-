<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Siber Kasa Ultimate</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

<style>

:root{
    --primary:#2563eb;
    --success:#10b981;
    --bg:#f4f8ff;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial;
}

body{
    background:var(--bg);
    display:flex;
    min-height:100vh;
}

/* DARK MODE */

.dark-mode{
    background:#0f172a;
    color:white;
}

.dark-mode .sidebar,
.dark-mode .card,
.dark-mode .item-box{
    background:#1e293b;
    color:white;
}

/* LOGIN */

#auth-overlay{
    position:fixed;
    inset:0;
    background:linear-gradient(135deg,#dbeafe,#eff6ff);
    display:flex;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.auth-box{
    width:400px;
    background:white;
    padding:35px;
    border-radius:20px;
}

.auth-input{
    width:100%;
    padding:14px;
    margin-top:12px;
    border-radius:12px;
    border:1px solid #dbeafe;
}

.auth-btn{
    width:100%;
    padding:14px;
    margin-top:15px;
    border:none;
    background:var(--primary);
    color:white;
    border-radius:12px;
    cursor:pointer;
}

.tabs{
    display:flex;
    margin-bottom:20px;
    background:#eff6ff;
    border-radius:10px;
    padding:5px;
}

.tab{
    flex:1;
    text-align:center;
    padding:10px;
    border-radius:8px;
    cursor:pointer;
}

.tab.active{
    background:white;
    color:var(--primary);
    font-weight:bold;
}

/* SIDEBAR */

.sidebar{
    width:260px;
    background:white;
    padding:20px;
    border-right:1px solid #ddd;
}

.logo{
    font-size:24px;
    font-weight:bold;
    color:var(--primary);
    margin-bottom:30px;
}

.nav-item{
    padding:14px;
    border-radius:12px;
    margin-bottom:10px;
    cursor:pointer;
}

.nav-item:hover{
    background:#eff6ff;
}

.nav-item.active{
    background:#dbeafe;
}

/* CONTENT */

.main{
    flex:1;
    padding:40px;
}

.page{
    display:none;
}

.page.active{
    display:block;
}

.card{
    background:white;
    padding:20px;
    border-radius:20px;
    margin-top:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:20px;
    margin-top:20px;
}

.item-box{
    background:white;
    padding:20px;
    border-radius:20px;
    text-align:center;
}

.item-box i{
    font-size:40px;
    color:var(--primary);
    margin-bottom:10px;
}

.price{
    font-size:26px;
    color:var(--success);
    font-weight:bold;
    margin:10px 0;
}

.type{
    background:#eff6ff;
    padding:4px 10px;
    border-radius:10px;
    font-size:12px;
    display:inline-block;
    margin-top:10px;
}

</style>
</head>

<body>

<!-- LOGIN -->

<div id="auth-overlay">

    <div class="auth-box">

        <h1 style="text-align:center;color:#2563eb;">
            Siber Kasa
        </h1>

        <div class="tabs">

            <div class="tab active"
            id="login-tab"
            onclick="changeTab('login')">

            Giriş

            </div>

            <div class="tab"
            id="register-tab"
            onclick="changeTab('register')">

            Kayıt

            </div>

        </div>

        <input type="text"
        id="username"
        class="auth-input"
        placeholder="Kullanıcı adı">

        <input type="password"
        id="password"
        class="auth-input"
        placeholder="Şifre">

        <button class="auth-btn"
        id="main-btn"
        onclick="processAuth()">

        Giriş Yap

        </button>

        <p id="auth-error"
        style="margin-top:15px;color:red;text-align:center;">
        </p>

    </div>

</div>

<!-- SIDEBAR -->

<div class="sidebar">

    <div class="logo">
        <i class="fas fa-shield-halved"></i>
        Siber Kasa
    </div>

    <div class="nav-item active"
    onclick="switchPage('home',this)">
    Ana Sayfa
    </div>

    <div class="nav-item"
    onclick="switchPage('create',this)">
    Dosya Oluştur
    </div>

    <div class="nav-item"
    onclick="switchPage('files',this)">
    Dosyalarım
    </div>

    <div class="nav-item"
    onclick="switchPage('market',this)">
    Market
    </div>

    <div class="nav-item"
    onclick="toggleDarkMode()">
    Dark Mode
    </div>

    <div class="nav-item"
    onclick="createFolder()">
    Klasör Oluştur
    </div>

    <div class="nav-item"
    onclick="logout()"
    style="color:red;">
    Çıkış
    </div>

</div>

<!-- MAIN -->

<div class="main">

    <!-- HOME -->

    <div class="page active"
    id="home">

        <h1>Hoş Geldin</h1>

        <div class="card">

            <h3 id="premium-text">
            Paket: FREE
            </h3>

            <br>

            <button class="auth-btn"
            onclick="notify('Bildirim sistemi aktif')">

            Test Bildirimi

            </button>

        </div>

    </div>

    <!-- CREATE -->

    <div class="page"
    id="create">

        <h1>Dosya Oluştur</h1>

        <div class="card">

            <input type="text"
            id="fname"
            class="auth-input"
            placeholder="Dosya adı">

            <select id="ftype"
            class="auth-input"
            onchange="changeType()">

                <option value="text">
                    Metin Dosyası
                </option>

                <option value="file">
                    Gerçek Dosya
                </option>

            </select>

            <input type="password"
            id="fpassword"
            class="auth-input"
            placeholder="Dosya şifresi">

            <div id="text-area">

                <textarea
                id="fcontent"
                class="auth-input"
                style="height:180px;"
                placeholder="Metin yaz"></textarea>

            </div>

            <div id="file-area"
            style="display:none;">

                <input type="file"
                id="real-file"
                class="auth-input">

            </div>

            <button class="auth-btn"
            onclick="saveFile()">

            Kaydet

            </button>

        </div>

    </div>

    <!-- FILES -->

    <div class="page"
    id="files">

        <h1>Dosyalarım</h1>

        <input type="text"
        id="search"
        class="auth-input"
        placeholder="Dosya ara"
        onkeyup="searchFiles()">

        <div id="file-grid"
        class="grid"></div>

    </div>

    <!-- MARKET -->

    <div class="page"
    id="market">

        <h1>Market</h1>

        <div class="grid">

            <div class="item-box">
                <i class="fas fa-shield"></i>
                <h3>Süper Koruma</h3>
                <div class="price">$15</div>

                <button class="auth-btn"
                onclick="buyPremium('Süper Koruma')">

                Satın Al

                </button>
            </div>

            <div class="item-box">
                <i class="fas fa-lock"></i>
                <h3>Üst Düzey Koruma</h3>
                <div class="price">$40</div>

                <button class="auth-btn"
                onclick="buyPremium('Üst Düzey Koruma')">

                Satın Al

                </button>
            </div>

            <div class="item-box">
                <i class="fas fa-crown"></i>
                <h3>Ultra Security Elite</h3>
                <div class="price">$100</div>

                <button class="auth-btn"
                onclick="buyPremium('Ultra Security Elite')">

                Satın Al

                </button>
            </div>

        </div>

    </div>

</div>

<script>

/* =========================
GENEL
========================= */

let mode = "login";
let currentUser = "";

/* =========================
ANTI F12
========================= */

document.onkeydown = function(e){

    if(e.keyCode == 123){
        return false;
    }

    if(
        e.ctrlKey &&
        e.shiftKey &&
        e.keyCode == 'I'.charCodeAt(0)
    ){
        return false;
    }
}

/* =========================
SAĞ TIK KAPAT
========================= */

document.addEventListener(
'contextmenu',
event => event.preventDefault()
);

/* =========================
TAB
========================= */

function changeTab(type){

    mode = type;

    if(type === "login"){

        login-tab.classList.add("active");
        register-tab.classList.remove("active");

        main-btn.innerText = "Giriş Yap";

    }else{

        register-tab.classList.add("active");
        login-tab.classList.remove("active");

        main-btn.innerText = "Kayıt Ol";
    }
}

/* =========================
AUTH
========================= */

function processAuth(){

    const username =
    document.getElementById("username").value;

    const password =
    document.getElementById("password").value;

    let users =
    JSON.parse(
        localStorage.getItem("vault_users")
        || "{}"
    );

    if(mode === "register"){

        if(users[username]){

            auth-error.innerText =
            "Bu kullanıcı var";

            return;
        }

        users[username] = {

            password:password,

            premium:"FREE",

            files:[],

            folders:[],

            profile:{
                xp:0,
                level:1,
                badge:"Yeni Üye"
            }
        };

        localStorage.setItem(
            "vault_users",
            JSON.stringify(users)
        );

        alert("Kayıt başarılı");

        changeTab("login");

    }else{

        if(
            users[username] &&
            users[username].password === password
        ){

            currentUser = username;

            localStorage.setItem(
                "active_user",
                username
            );

            auth-overlay.style.display = "none";

            loadFiles();

            updatePremium();

        }else{

            auth-error.innerText =
            "Hatalı giriş";
        }
    }
}

/* =========================
OTURUM
========================= */

window.onload = function(){

    const active =
    localStorage.getItem("active_user");

    if(active){

        currentUser = active;

        auth-overlay.style.display = "none";

        loadFiles();

        updatePremium();
    }
}

/* =========================
PAGE
========================= */

function switchPage(id,el){

    document.querySelectorAll(".page")
    .forEach(p=>p.classList.remove("active"));

    document.getElementById(id)
    .classList.add("active");

    document.querySelectorAll(".nav-item")
    .forEach(n=>n.classList.remove("active"));

    el.classList.add("active");
}

/* =========================
TYPE
========================= */

function changeType(){

    const type =
    document.getElementById("ftype").value;

    if(type === "text"){

        text-area.style.display = "block";
        file-area.style.display = "none";

    }else{

        text-area.style.display = "none";
        file-area.style.display = "block";
    }
}

/* =========================
SAVE FILE
========================= */

function saveFile(){

    const name = fname.value;
    const type = ftype.value;
    const pass = fpassword.value;

    let users =
    JSON.parse(localStorage.getItem("vault_users"));

    if(type === "text"){

        users[currentUser].files.push({

            name:name,

            type:type,

            password:pass,

            content:fcontent.value,

            favorite:false
        });

        localStorage.setItem(
            "vault_users",
            JSON.stringify(users)
        );

        notify("Metin kaydedildi");

        addXP(10);

        loadFiles();

    }else{

        const file =
        document.getElementById("real-file")
        .files[0];

        if(!file){

            alert("Dosya seç");

            return;
        }

        const reader =
        new FileReader();

        reader.onload = function(e){

            users[currentUser].files.push({

                name:name,

                type:type,

                password:pass,

                filename:file.name,

                data:e.target.result,

                favorite:false
            });

            localStorage.setItem(
                "vault_users",
                JSON.stringify(users)
            );

            notify("Dosya yüklendi");

            addXP(20);

            loadFiles();
        }

        reader.readAsDataURL(file);
    }
}

/* =========================
LOAD FILES
========================= */

function loadFiles(){

    const grid =
    document.getElementById("file-grid");

    grid.innerHTML = "";

    let users =
    JSON.parse(localStorage.getItem("vault_users"));

    const files =
    users[currentUser].files;

    files.forEach((file,index)=>{

        grid.innerHTML += `

        <div class="item-box file-box">

            <i class="fas fa-lock"></i>

            <h3>${file.name}</h3>

            <div class="type">
                ${file.type}
            </div>

            <br><br>

            <button class="auth-btn"
            onclick="openFile(${index})">

            Aç

            </button>

            <button class="auth-btn"
            onclick="deleteFile(${index})">

            Sil

            </button>

            <button class="auth-btn"
            onclick="favoriteFile(${index})">

            Favori

            </button>

            <button class="auth-btn"
            onclick="shareFile(${index})">

            Paylaş

            </button>

            <button class="auth-btn"
            onclick="editFile(${index})">

            Düzenle

            </button>

        </div>

        `;
    });
}

/* =========================
OPEN FILE
========================= */

function openFile(index){

    let users =
    JSON.parse(localStorage.getItem("vault_users"));

    const file =
    users[currentUser].files[index];

    const pass =
    prompt("Dosya şifresi");

    if(pass !== file.password){

        alert("Şifre yanlış");

        return;
    }

    if(file.type === "text"){

        alert(file.content);

    }else{

        const a =
        document.createElement("a");

        a.href = file.data;

        a.download = file.filename;

        a.click();
    }
}

/* =========================
DELETE FILE
========================= */

function deleteFile(index){

    let users =
    JSON.parse(localStorage.getItem("vault_users"));

    users[currentUser].files
    .splice(index,1);

    localStorage.setItem(
        "vault_users",
        JSON.stringify(users)
    );

    notify("Dosya silindi");

    loadFiles();
}

/* =========================
FAVORITE
========================= */

function favoriteFile(index){

    let users =
    JSON.parse(localStorage.getItem("vault_users"));

    users[currentUser]
    .files[index]
    .favorite = true;

    localStorage.setItem(
        "vault_users",
        JSON.stringify(users)
    );

    notify("Favorilere eklendi");
}

/* =========================
SEARCH
========================= */

function searchFiles(){

    const value =
    search.value.toLowerCase();

    document.querySelectorAll(".file-box")
    .forEach(box=>{

        if(
            box.innerText.toLowerCase()
            .includes(value)
        ){

            box.style.display = "block";

        }else{

            box.style.display = "none";
        }
    });
}

/* =========================
PREMIUM
========================= */

function buyPremium(name){

    let users =
    JSON.parse(localStorage.getItem("vault_users"));

    users[currentUser].premium = name;

    localStorage.setItem(
        "vault_users",
        JSON.stringify(users)
    );

    updatePremium();

    notify(name + " aktif edildi");
}

function updatePremium(){

    let users =
    JSON.parse(localStorage.getItem("vault_users"));

    premium-text.innerText =
    "Paket: " +
    users[currentUser].premium;
}

/* =========================
NOTIFY
========================= */

function notify(text){

    const div =
    document.createElement("div");

    div.innerText = text;

    div.style.position = "fixed";
    div.style.right = "20px";
    div.style.top = "20px";
    div.style.background = "#10b981";
    div.style.color = "white";
    div.style.padding = "15px";
    div.style.borderRadius = "10px";
    div.style.zIndex = "9999";

    document.body.appendChild(div);

    setTimeout(()=>{
        div.remove();
    },3000);
}

/* =========================
DARK MODE
========================= */

function toggleDarkMode(){

    document.body.classList.toggle(
        "dark-mode"
    );
}

/* =========================
XP
========================= */

function addXP(amount){

    let users =
    JSON.parse(localStorage.getItem("vault_users"));

    users[currentUser]
    .profile.xp += amount;

    if(
        users[currentUser]
        .profile.xp >= 100
    ){

        users[currentUser]
        .profile.level++;

        users[currentUser]
        .profile.xp = 0;

        notify("Level atladın");
    }

    localStorage.setItem(
        "vault_users",
        JSON.stringify(users)
    );
}

/* =========================
EDIT
========================= */

function editFile(index){

    let users =
    JSON.parse(localStorage.getItem("vault_users"));

    const file =
    users[currentUser].files[index];

    if(file.type !== "text"){
        return;
    }

    const newText =
    prompt(
        "Yeni içerik",
        file.content
    );

    if(newText !== null){

        file.content = newText;

        localStorage.setItem(
            "vault_users",
            JSON.stringify(users)
        );

        notify("Güncellendi");
    }
}

/* =========================
SHARE
========================= */

function shareFile(index){

    const code =
    Math.random()
    .toString(36)
    .substring(2,10);

    alert(
        "Paylaşım kodu: " + code
    );
}

/* =========================
FOLDER
========================= */

function createFolder(){

    const folder =
    prompt("Klasör adı");

    if(!folder) return;

    let users =
    JSON.parse(localStorage.getItem("vault_users"));

    users[currentUser]
    .folders.push(folder);

    localStorage.setItem(
        "vault_users",
        JSON.stringify(users)
    );

    notify("Klasör oluşturuldu");
}

/* =========================
AUTO LOGOUT
========================= */

let timeout;

function resetTimer(){

    clearTimeout(timeout);

    timeout = setTimeout(()=>{

        alert("Oturum süresi doldu");

        logout();

    },300000);
}

window.onload = resetTimer;

document.onmousemove = resetTimer;
document.onkeypress = resetTimer;

/* =========================
LOGOUT
========================= */

function logout(){

    localStorage.removeItem(
        "active_user"
    );

    location.reload();
}

</script>

</body>
    </html>
