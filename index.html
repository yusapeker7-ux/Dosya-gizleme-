<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Siber Kasa Vercel Vault</title>

<style>
body{margin:0;font-family:Arial;display:flex;background:#eef2ff}

.sidebar{width:220px;background:white;height:100vh;padding:15px}
.main{flex:1;padding:20px}

.page{display:none}
.page.active{display:block}

input,textarea,select{
width:100%;padding:10px;margin-top:8px;border-radius:10px;border:1px solid #ccc}

button{
width:100%;padding:10px;margin-top:10px;
background:#2563eb;color:white;border:none;border-radius:10px;cursor:pointer}

.card{background:white;padding:15px;border-radius:15px;margin-top:10px}

.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}

.item{background:white;padding:10px;border-radius:10px;text-align:center}

.modal{
position:fixed;inset:0;background:rgba(0,0,0,.6);
display:none;justify-content:center;align-items:center}

.box{background:white;padding:20px;width:320px;border-radius:15px}

.dark{background:#0f172a;color:white}
.dark .card{background:#1e293b;color:white}
</style>
</head>

<body>

<!-- AUTH -->
<div id="auth" class="modal" style="display:flex">
<div class="box">

<h2>Giriş / Kayıt</h2>

<input id="u" placeholder="kullanıcı">
<input id="p" type="password" placeholder="şifre">

<button onclick="register()">Kayıt</button>
<button onclick="login()">Giriş</button>

<p id="msg"></p>

</div>
</div>

<!-- PAYMENT -->
<div id="pay" class="modal">
<div class="box">

<h3 id="pt">Ödeme</h3>

<input id="c1" placeholder="Kart sahibi">
<input id="c2" placeholder="Kart no">
<input id="c3" placeholder="AA/YY">
<input id="c4" placeholder="CVV">

<button onclick="buy()">Onayla</button>
<button onclick="pay.style.display='none'">İptal</button>

</div>
</div>

<!-- SIDEBAR -->
<div class="sidebar">

<button onclick="show('home')">Ana</button>
<button onclick="show('create')">Oluştur</button>
<button onclick="show('files')">Dosyalar</button>
<button onclick="show('market')">Market</button>
<button onclick="toggle()">Dark</button>
<button onclick="logout()">Çıkış</button>

</div>

<!-- MAIN -->
<div class="main">

<div id="home" class="page active">
<h2>Panel</h2>
<div class="card">
Plan: <span id="plan">FREE</span>
</div>
</div>

<!-- CREATE -->
<div id="create" class="page">

<h2>Dosya Oluştur</h2>

<input id="fname" placeholder="dosya adı">

<select id="type" onchange="typeChange()">
<option value="text">Metin</option>
<option value="file">Dosya</option>
<option value="code">Kod</option>
</select>

<textarea id="ftext" placeholder="içerik" style="height:120px"></textarea>

<input type="file" id="fupload" style="display:none;margin-top:10px">

<input id="fpass" placeholder="şifre">

<button onclick="save()">Kaydet</button>

</div>

<!-- FILES -->
<div id="files" class="page">

<h2>Dosyalar</h2>

<input id="search" placeholder="ara" onkeyup="search()">

<div id="list"></div>

</div>

<!-- MARKET -->
<div id="market" class="page">

<h2>Market</h2>

<div class="grid">

<div class="item">
Süper 15$
<button onclick="openPay('Süper')">Al</button>
</div>

<div class="item">
Pro 40$
<button onclick="openPay('Pro')">Al</button>
</div>

<div class="item">
Elite 100$
<button onclick="openPay('Elite')">Al</button>
</div>

</div>

</div>

</div>

<script>

let user=""
let selected=""

/* DB */
function db(){
return JSON.parse(localStorage.getItem("db")||"{}")
}
function saveDB(d){
localStorage.setItem("db",JSON.stringify(d))
}

/* REGISTER */
function register(){
let d=db()
if(d[u.value]) return msg("var")

d[u.value]={pass:p.value,files:[],plan:"FREE"}
saveDB(d)
msg("ok")
}

/* LOGIN */
function login(){
let d=db()

if(d[u.value]&&d[u.value].pass==p.value){
user=u.value
localStorage.setItem("u",user)
auth.style.display="none"
load()
}else msg("hata")
}

/* LOGOUT */
function logout(){
localStorage.removeItem("u")
location.reload()
}

/* PAGE */
function show(x){
document.querySelectorAll(".page").forEach(p=>p.classList.remove("active"))
document.getElementById(x).classList.add("active")
}

/* TYPE SWITCH */
function typeChange(){
if(type.value=="file"){
ftext.style.display="none"
fupload.style.display="block"
}else{
ftext.style.display="block"
fupload.style.display="none"
}
}

/* SAVE */
function save(){

let d=db()

function add(content){

d[user].files.push({
name:fname.value,
type:type.value,
data:content,
pass:fpass.value
})

saveDB(d)
load()
}

if(type.value=="file"){

let r=new FileReader()
r.onload=function(e){
add(e.target.result)
}
r.readAsDataURL(fupload.files[0])

}else{
add(ftext.value)
}

}

/* LOAD */
function load(){

let d=db()

plan.innerText=d[user].plan

list.innerHTML=""

d[user].files.forEach((f,i)=>{
list.innerHTML+=`
<div class="card">
<b>${f.name}</b>
<button onclick="openF(${i})">Aç</button>
</div>`
})

}

/* OPEN FILE */
function openF(i){

let d=db()
let f=d[user].files[i]

let p=prompt("şifre")

if(p!=f.pass){
alert("yanlış")
return
}

if(f.type=="file"){
window.open(f.data)
}else{
alert(f.data)
}

}

/* SEARCH */
function search(){
let v=search.value.toLowerCase()

document.querySelectorAll(".card").forEach(c=>{
c.style.display=c.innerText.toLowerCase().includes(v)?"block":"none"
})
}

/* PAYMENT */
function openPay(p){
selected=p
pay.style.display="flex"
pt.innerText=p
}

function buy(){

if(!c1.value||!c2.value||!c3.value||!c4.value){
alert("eksik")
return
}

let d=db()
d[user].plan=selected
saveDB(d)

plan.innerText=selected
pay.style.display="none"

alert("satın alındı")
}

/* DARK */
function toggle(){
document.body.classList.toggle("dark")
}

/* AUTO LOGIN */
window.onload=()=>{
let u=localStorage.getItem("u")
if(u){
user=u
auth.style.display="none"
load()
}
}

/* MSG */
function msg(t){
document.getElementById("msg").innerText=t
}

</script>

</body>
</html>
