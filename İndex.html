<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ASTRON | Üst Düzey Koruma</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root { --p: #2563eb; --bg: #f8fafc; --text: #0f172a; --border: #e2e8f0; }
        * { box-sizing: border-box; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; }

        /* AUTH SECTIONS */
        .auth-container { height: 100vh; display: flex; align-items: center; justify-content: center; }
        .card { background: white; padding: 40px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); width: 100%; max-width: 400px; border: 1px solid var(--border); }
        .hidden { display: none; }

        /* UI ELEMENTS */
        h1 { font-size: 24px; margin-bottom: 8px; text-align: center; color: var(--p); }
        p.desc { color: #64748b; font-size: 14px; text-align: center; margin-bottom: 24px; }
        input { width: 100%; padding: 12px; margin-bottom: 16px; border: 1px solid var(--border); border-radius: 10px; outline: none; }
        input:focus { border-color: var(--p); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        button { width: 100%; padding: 14px; background: var(--p); color: white; border: none; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.2s; }
        button:hover { background: #1d4ed8; }
        .switch { text-align: center; margin-top: 15px; font-size: 13px; cursor: pointer; color: var(--p); }

        /* DASHBOARD */
        #dashboard { padding: 20px; max-width: 1200px; margin: 0 auto; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; border-bottom: 1px solid var(--border); }
        .grid { display: grid; grid-template-columns: 1fr 2fr; gap: 20px; margin-top: 20px; }
        .panel { background: white; border-radius: 16px; padding: 24px; border: 1px solid var(--border); }
        .stat-box { display: flex; gap: 10px; margin-bottom: 20px; }
        .stat { background: #eff6ff; padding: 15px; border-radius: 12px; flex: 1; text-align: center; border: 1px solid #dbeafe; }
        .stat span { display: block; font-size: 20px; font-weight: 700; color: var(--p); }
        .stat label { font-size: 11px; color: #64748b; text-transform: uppercase; }

        textarea { width: 100%; border: 1px solid var(--border); border-radius: 10px; padding: 10px; height: 150px; resize: none; }
        .data-list { margin-top: 15px; font-size: 13px; max-height: 200px; overflow-y: auto; }
        .data-item { padding: 10px; border-bottom: 1px solid #f1f5f9; display: flex; justify-content: space-between; }
    </style>
</head>
<body>

<div id="loginSection" class="auth-container">
    <div class="card">
        <h1>ASTRON Giriş</h1>
        <p class="desc">Üst Düzey Koruma Sistemine Hoş Geldiniz</p>
        <input type="text" id="logUser" placeholder="Kullanıcı Adı">
        <input type="password" id="logPass" placeholder="Şifre">
        <button onclick="handleLogin()">Sisteme Eriş</button>
        <div class="switch" onclick="toggleAuth()">Hesabınız yok mu? Kaydolun</div>
    </div>
</div>

<div id="registerSection" class="auth-container hidden">
    <div class="card">
        <h1>Hesap Oluştur</h1>
        <p class="desc">Verilerinizi Bulut Veritabanımızda Saklayın</p>
        <input type="text" id="regUser" placeholder="Kullanıcı Adı">
        <input type="password" id="regPass" placeholder="Şifre Belirleyin">
        <button onclick="handleRegister()">Kayıt Ol ve Başla</button>
        <div class="switch" onclick="toggleAuth()">Zaten hesabınız var mı? Giriş yapın</div>
    </div>
</div>

<div id="dashboard" class="hidden">
    <header>
        <div style="font-weight: 800; font-size: 22px; color: var(--p);">ASTRON | <span style="font-weight: 300; color: #64748b;">Kasa</span></div>
        <button onclick="logout()" style="width: auto; padding: 8px 16px; background: #f1f5f9; color: #475569;">Çıkış Yap</button>
    </header>

    <div class="stat-box">
        <div class="stat"><span id="noteCount">0</span><label>Kayıtlı Not</label></div>
        <div class="stat"><span>256-Bit</span><label>Şifreleme</label></div>
        <div class="stat"><span>%100</span><label>Veri Güvenliği</label></div>
    </div>

    <div class="grid">
        <div class="panel">
            <h3>Yeni Veri Girişi</h3>
            <label style="font-size: 12px;">Başlık</label>
            <input type="text" id="dataTitle" placeholder="Örn: Gizli Dosya Linki">
            <label style="font-size: 12px;">Detaylar</label>
            <textarea id="dataContent" placeholder="Saklamak istediğiniz bilgileri buraya yazın..."></textarea>
            <button onclick="saveData()" style="margin-top:10px;">Kasaya Kilitle</button>
        </div>

        <div class="panel">
            <h3>Güvenli Arşiv</h3>
            <div id="dataList" class="data-list">
                <p style="color: #94a3b8; text-align: center;">Henüz kaydedilmiş veri yok.</p>
            </div>
        </div>
    </div>
</div>

<script>
    // AUTH MANTIĞI
    function toggleAuth() {
        document.getElementById('loginSection').classList.toggle('hidden');
        document.getElementById('registerSection').classList.toggle('hidden');
    }

    function handleRegister() {
        const u = document.getElementById('regUser').value;
        const p = document.getElementById('regPass').value;
        if(u && p) {
            localStorage.setItem('astron_user', u);
            localStorage.setItem('astron_pass', p);
            alert("Kayıt Başarılı! Şimdi giriş yapabilirsiniz.");
            toggleAuth();
        } else { alert("Lütfen tüm alanları doldurun!"); }
    }

    function handleLogin() {
        const u = document.getElementById('logUser').value;
        const p = document.getElementById('logPass').value;
        const storedU = localStorage.getItem('astron_user');
        const storedP = localStorage.getItem('astron_pass');

        if(u === storedU && p === storedP) {
            document.getElementById('loginSection').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            renderData();
        } else { alert("Hatalı kullanıcı adı veya şifre!"); }
    }

    // VERİ MANTIĞI
    function saveData() {
        const title = document.getElementById('dataTitle').value;
        const content = document.getElementById('dataContent').value;
        if(!title || !content) return;

        let vault = JSON.parse(localStorage.getItem('astron_vault') || '[]');
        vault.push({ title, content, date: new Date().toLocaleDateString() });
        localStorage.setItem('astron_vault', JSON.stringify(vault));

        document.getElementById('dataTitle').value = "";
        document.getElementById('dataContent').value = "";
        renderData();
    }

    function renderData() {
        const vault = JSON.parse(localStorage.getItem('astron_vault') || '[]');
        const list = document.getElementById('dataList');
        document.getElementById('noteCount').innerText = vault.length;
        
        if(vault.length === 0) return;
        
        list.innerHTML = vault.map(item => `
            <div class="data-item">
                <div><strong>${item.title}</strong><br><small style="color:#94a3b8">${item.content}</small></div>
                <div style="font-size: 10px; color: var(--p);">${item.date}</div>
            </div>
        `).join('');
    }

    function logout() { location.reload(); }
</script>
</body>
</html>
